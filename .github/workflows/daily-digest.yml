name: 📰 AI Daily Digest

on:
  # 毎朝 JST 7:00 (UTC 22:00) に実行（平日のみ）
  # UTC日〜木 = JST月〜金（UTC 22:00 = JST翌日 7:00）
  schedule:
    - cron: '0 22 * * 0-4'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-digest-issue:
    runs-on: ubuntu-latest
    steps:
      - name: 日付を取得
        id: date
        run: |
          # JST (UTC+9) の日付を取得
          echo "today=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Daily Digest Issue を作成し Copilot をアサイン
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          TODAY="${{ steps.date.outputs.today }}"
          
          ISSUE_TITLE="📰 AI Daily Digest - ${TODAY}"
          
          ISSUE_BODY="# 🤖 AI News Daily Digest

          ## 収集対象日
          ${TODAY}

          ## 収集対象サイト
          1. **MIT Technology Review** - https://www.technologyreview.com/topic/artificial-intelligence/
          2. **VentureBeat AI** - https://venturebeat.com/category/ai/
          3. **TechCrunch AI** - https://techcrunch.com/tag/artificial-intelligence/
          4. **The Verge AI** - https://www.theverge.com/ai-artificial-intelligence
          5. **Towards Data Science** - https://towardsdatascience.com/
          6. **Wired (AI)** - https://www.wired.com/tag/artificial-intelligence/

          ## 出力形式
          - 各サイトから1-2件の重要記事を選定
          - 日本語で要約を作成
          - 記事タイトル・見出し・参考リンクのリンクテキストも日本語で記述する
          - 10分で読める分量（約2000-3000文字）
          - 実践的なアクションアイテムを含める

          ## 重複防止
          - \`.article-history/articles-history.json\` の履歴を確認
          - 過去7日分の記事との重複をチェック
          - 重複記事は自動的にスキップ
          - 収集後、Copilotが履歴ファイルを自動更新

          ## 出力先
          \`daily/${TODAY}.md\`

          ---

          @copilot 上記の収集対象サイトから最新のAI関連ニュースを収集し、要約を作成してください。"
          
          # Issue を作成
          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "copilot")
          
          echo "✅ Issue created: $ISSUE_URL"
          
          # Issue番号を抽出
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -o '[0-9]\+$')
          echo "Issue number: $ISSUE_NUMBER"
          
          # GitHub APIでCopilotをアサイン
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/assignees" \
            --input - <<EOF || echo "⚠️ Copilotの自動アサインに失敗（Issue本文の@copilotメンションで起動します）"
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "${{ github.repository }}",
              "base_branch": "main",
              "custom_instructions": "",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF
          
          echo "✅ Copilot assigned to issue #$ISSUE_NUMBER"
